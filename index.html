<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Flow - Navy Firebase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #001d3d;
            --navy-light: #003566;
            --success: #2ec4b6;
            --danger: #e71d36;
            --white: #ffffff;
            --bg: #f8f9fa;
            --border: #dee2e6;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 20px; background-color: var(--bg); color: var(--navy); }
        .container { max-width: 900px; margin: 20px auto; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        header { text-align: left; margin-bottom: 25px; border-left: 5px solid var(--navy); padding-left: 15px; }
        header h2 { margin: 0; font-size: 1.4rem; font-weight: 700; color: var(--navy); }
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { padding: 20px; border-radius: 10px; background: var(--white); border: 1px solid var(--border); transition: 0.3s; }
        .card p { margin: 0; font-size: 10px; text-transform: uppercase; color: #6c757d; font-weight: 700; }
        .card h3 { margin: 8px 0 0 0; font-size: 1.2rem; font-weight: 700; color: var(--navy); }
        .card-main { background: var(--navy); color: var(--white); border: none; }
        .card-main p { color: rgba(255,255,255,0.7); }
        .card-main h3 { color: var(--white); }
        .form-container { background: #fff; padding: 20px; border: 2px solid var(--navy); border-radius: 10px; display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        input, select { flex: 1; min-width: 140px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; outline: none; }
        button.btn-save { padding: 10px 25px; background: var(--navy); color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        button.btn-save:hover { background: var(--navy-light); }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--white); }
        th { text-align: left; padding: 15px; background: var(--navy); color: white; font-size: 11px; text-transform: uppercase; font-weight: 600; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .trx-id { font-family: monospace; color: #6c757d; font-size: 10px; }
        .date-text { font-size: 11px; color: #888; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .bg-masuk { border: 1px solid var(--success); color: var(--success); }
        .bg-keluar { border: 1px solid var(--danger); color: var(--danger); }
        .btn-delete { color: #adb5bd; cursor: pointer; border: none; background: none; font-size: 1.2rem; transition: 0.2s; }
        .btn-delete:hover { color: var(--danger); }
        @media (max-width: 600px) { .form-container { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>FINANCIAL STATEMENT (FIREBASE)</h2>
    </header>

    <div class="summary">
        <div class="card">
            <p>Pemasukan</p>
            <h3 id="total-masuk">Rp 0</h3>
        </div>
        <div class="card">
            <p>Pengeluaran</p>
            <h3 id="total-keluar">Rp 0</h3>
        </div>
        <div class="card card-main">
            <p>Total Saldo</p>
            <h3 id="saldo-akhir">Rp 0</h3>
        </div>
    </div>

    <div class="form-container">
        <input type="text" id="deskripsi" placeholder="Keterangan Transaksi">
        <input type="number" id="nominal" placeholder="Nominal (Rp)">
        <select id="tipe">
            <option value="masuk">Pemasukan (+)</option>
            <option value="keluar">Pengeluaran (-)</option>
        </select>
        <button class="btn-save" id="btnSimpan">SIMPAN</button>
    </div>

    <div class="table-responsive">
        <table id="tabel-transaksi">
            <thead>
                <tr>
                    <th>ID & TANGGAL</th>
                    <th>KETERANGAN</th>
                    <th>TIPE</th>
                    <th>NOMINAL</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, onSnapshot, 
        deleteDoc, doc, query, orderBy, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. Konfigurasi Firebase sesuai data kamu
    const firebaseConfig = {
        apiKey: "AIzaSyDSNARasw6GmWP4_0t3ZkXu2vHhkii_lLA",
        authDomain: "cashflow-49d4e.firebaseapp.com",
        projectId: "cashflow-49d4e",
        storageBucket: "cashflow-49d4e.firebasestorage.app",
        messagingSenderId: "903020022186",
        appId: "1:903020022186:web:55133d5fe2e02dce1a43d3",
        measurementId: "G-2T6EYC8WTG"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "transaksi");

    // 2. Fungsi Tambah Transaksi
    async function tambahTransaksi() {
        const deskripsi = document.getElementById('deskripsi').value;
        const nominal = parseInt(document.getElementById('nominal').value);
        const tipe = document.getElementById('tipe').value;

        if (!deskripsi || isNaN(nominal)) {
            alert("Harap isi deskripsi dan nominal.");
            return;
        }

        const sekarang = new Date();
        const idTrx = "TX" + sekarang.getTime().toString().slice(-4);
        const formatTanggal = sekarang.toLocaleDateString('id-ID', { 
            day: '2-digit', month: 'short', year: 'numeric'
        });

        try {
            await addDoc(colRef, {
                kodeTrx: idTrx,
                tanggal: formatTanggal,
                deskripsi: deskripsi,
                nominal: nominal,
                tipe: tipe,
                createdAt: serverTimestamp() 
            });
            document.getElementById('deskripsi').value = '';
            document.getElementById('nominal').value = '';
        } catch (err) {
            console.error("Error:", err);
        }
    }

    // 3. Fungsi Hapus Transaksi
    async function hapusTransaksi(id) {
        if(confirm('Hapus data transaksi ini?')) {
            await deleteDoc(doc(db, "transaksi", id));
        }
    }

    // 4. Real-time Listener (Update Otomatis)
    const q = query(colRef, orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        let transaksi = [];
        let masuk = 0, keluar = 0;
        const tbody = document.querySelector('#tabel-transaksi tbody');
        tbody.innerHTML = '';

        snapshot.docs.forEach((doc) => {
            const item = { ...doc.data(), id: doc.id };
            
            // Hitung Summary
            if (item.tipe === 'masuk') masuk += item.nominal;
            else keluar += item.nominal;

            // Render Baris Tabel
            const row = `<tr>
                <td>
                    <div class="trx-id">${item.kodeTrx}</div>
                    <div class="date-text">${item.tanggal}</div>
                </td>
                <td style="font-weight: 600; color: var(--navy-light);">${item.deskripsi}</td>
                <td><span class="badge ${item.tipe === 'masuk' ? 'bg-masuk' : 'bg-keluar'}">${item.tipe}</span></td>
                <td style="font-weight: 700;">Rp ${item.nominal.toLocaleString('id-ID')}</td>
                <td style="text-align: right;">
                    <button class="btn-del" data-id="${item.id}" style="color:#adb5bd; cursor:pointer; border:none; background:none; font-size:1.2rem;">&times;</button>
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // Update Angka Summary
        document.getElementById('total-masuk').innerText = `Rp ${masuk.toLocaleString('id-ID')}`;
        document.getElementById('total-keluar').innerText = `Rp ${keluar.toLocaleString('id-ID')}`;
        document.getElementById('saldo-akhir').innerText = `Rp ${(masuk - keluar).toLocaleString('id-ID')}`;

        // Pasang event listener hapus untuk setiap tombol
        document.querySelectorAll('.btn-del').forEach(btn => {
            btn.onclick = () => hapusTransaksi(btn.getAttribute('data-id'));
        });
    });

    // Pasang event listener untuk tombol simpan
    document.getElementById('btnSimpan').onclick = tambahTransaksi;
</script>

</body>
</html>
